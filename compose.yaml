services:
  postgres:
    image: postgres:17-alpine
    environment:
      POSTGRES_USER: vtv
      POSTGRES_PASSWORD: vtv
      POSTGRES_DB: vtv
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U vtv -d vtv"]
      interval: 3s
      timeout: 3s
      retries: 20
    volumes:
      - vtv-postgres:/var/lib/postgresql/data
      - ./infra/postgres/init-test-db.sql:/docker-entrypoint-initdb.d/10-test-db.sql:ro

  minio:
    image: minio/minio:latest
    command: server /data --console-address :9001
    environment:
      MINIO_ROOT_USER: vtv
      MINIO_ROOT_PASSWORD: change-me-in-non-local-environments
    ports:
      - "9000:9000"
      - "9001:9001"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 3s
      timeout: 3s
      retries: 20
    volumes:
      - vtv-minio:/data

volumes:
  vtv-postgres:
  vtv-minio:
