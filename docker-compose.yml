version: "3.9"

services:
  postgres:
    image: postgres:17-alpine
    container_name: vtv-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: vtv
      POSTGRES_PASSWORD: change-me-in-non-local-environments
      POSTGRES_DB: vtv
    ports:
      - "5432:5432"
    volumes:
      - vtv_postgres_data:/var/lib/postgresql/data
      - ./infra/postgres/init-test-db.sql:/docker-entrypoint-initdb.d/01-test-db.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U vtv -d vtv"]
      interval: 3s
      timeout: 5s
      retries: 15

  minio:
    image: minio/minio:RELEASE.2025-01-20T14-49-07Z
    container_name: vtv-minio
    restart: unless-stopped
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: vtv
      MINIO_ROOT_PASSWORD: change-me-in-non-local-environments
    ports:
      - "9000:9000"
      - "9001:9001"   # MinIO Console UI
    volumes:
      - vtv_minio_data:/data
    healthcheck:
      test: ["CMD", "curl", "-sf", "http://localhost:9000/minio/health/live"]
      interval: 3s
      timeout: 5s
      retries: 15

volumes:
  vtv_postgres_data:
  vtv_minio_data:
